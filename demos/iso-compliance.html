<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Demo: Monitor de Confianza Digital | Precisc</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #fafafa; --surface: #ffffff; --border: #e1e6ed;
    --accent: #2c3e50; --accent2: #638475; --text: #1a1f24;
  }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); }
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:1rem 6%; background:rgba(255,255,255,.93); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); }
  .btn-primary { background:var(--accent); color:#fff; padding:.78rem 1.6rem; border-radius:8px; font-weight:600; text-decoration:none; }
</style>
</head>
<body>

<!-- HEADER ORIGINAL -->
<nav>
  <div style="font-size:1.3rem; font-weight:800; color:var(--accent);">dave.</div>
  <ul style="display:flex; gap:2rem; list-style:none;">
    <li><a href="../index.html#proyectos" style="color:#4a5568; text-decoration:none; font-size:.85rem; font-weight:600; text-transform:uppercase;">Proyectos</a></li>
    <li><a href="../index.html#contacto" style="color:#4a5568; text-decoration:none; font-size:.85rem; font-weight:600; text-transform:uppercase;">Contacto</a></li>
  </ul>
</nav>

<!-- ÁREA DE LA DEMO (Dashboard Interactivo) -->
<section style="padding:120px 6% 60px;">
  <div style="background:white; border:1px solid var(--border); border-radius:14px; padding:2rem; shadow: 0 4px 20px rgba(0,0,0,0.03);">
    <h1 style="font-size:2rem; font-weight:800; margin-bottom:1rem;">Precisc <span style="font-weight:300; color:#718096;">| Digital Trust Monitor</span></h1>
    
    <!-- Aquí va el código del Dashboard (el que generamos con Chart.js) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
        <div class="bg-gray-50 p-6 rounded-xl border border-gray-100">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Cumplimiento ISO</h3>
            <canvas id="radarChart"></canvas>
        </div>
        <!-- Más componentes de la demo... -->
    </div>
  </div>
</section>

<!-- SECCIÓN DE CONTACTO ORIGINAL -->
<section id="contacto" style="background:linear-gradient(135deg,#f8f9fa 0%,#f0f2f5 100%); text-align:center; padding:88px 6%;">
    <h2 style="font-size:2.3rem; font-weight:800; margin-bottom:.7rem;">¿Tienes un proyecto en mente?</h2>
    <p style="color:#4a5568; max-width:500px; margin:0 auto 2rem;">Programa una llamada de 30 minutos sin costo para explorar cómo puedo ayudarte.</p>
    <a href="https://calendly.com/dagarciahz/30min" target="_blank" class="btn-primary">📅 Programa llamada gratuita</a>
</section>

<!-- FOOTER ORIGINAL -->
<footer style="background:#fff; border-top:1px solid var(--border); padding:1.6rem 6%; display:flex; justify-content:space-between;">
  <div style="font-weight:800; color:var(--accent);">dave.</div>
  <div style="font-size:.78rem; color:#718096;">© 2026 · Especialista en procesos y gobierno TI · Pachuca, Hidalgo</div>
</footer>

<script>
    // Inicialización de charts para la demo
    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['A.5', 'A.6', 'A.7', 'A.8', 'A.9'],
            datasets: [{ label: 'Nivel', data: [80, 50, 90, 40, 60], borderColor: '#638475', backgroundColor: 'rgba(99, 132, 117, 0.2)' }]
        }
    });
</script>
</body>
</html>
