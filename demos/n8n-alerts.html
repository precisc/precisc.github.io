<!-- Header modificado con inputs -->
<header class="bg-precisc-card h-16 border-b border-precisc-border flex items-center justify-between px-6 shadow-sm z-20 flex-shrink-0 relative">
    <div class="flex items-center space-x-4">
        <div class="bg-precisc-blue text-white font-extrabold text-lg px-2.5 py-0.5 rounded-md tracking-tighter">
            dave.
        </div>
        <div class="h-5 w-px bg-precisc-border"></div>
        <h1 class="text-lg font-semibold text-precisc-blue">Precisc <span class="font-light text-gray-400">| Automation</span></h1>
    </div>
    
    <!-- NUEVO: Contenedor de Inputs y Botón -->
    <div class="flex items-center space-x-3">
        <input type="text" id="demo-nombre" placeholder="Tu nombre" class="px-3 py-1.5 border border-precisc-border rounded-md text-sm outline-none focus:border-precisc-blue" required>
        <input type="email" id="demo-correo" placeholder="tu@correo.com" class="px-3 py-1.5 border border-precisc-border rounded-md text-sm outline-none focus:border-precisc-blue" required>
        
        <button id="btn-run" onclick="executeWorkflow()" class="bg-precisc-blue hover:bg-slate-800 text-white px-5 py-2 rounded-lg font-semibold transition-all shadow-md flex items-center space-x-2">
            <i data-lucide="play" class="w-4 h-4"></i>
            <span>Ejecutar Workflow</span>
        </button>
    </div>
</header>
